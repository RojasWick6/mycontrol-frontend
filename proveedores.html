<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores | MyControl</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/inventario.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="logo" alt="MyControl logo">
            <h2>MyControl</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="text">Inicio</span></a>
            <a class="menu-item" href="inventario.html"><span class="icon">📦</span><span class="text">Inventario</span></a>
            <a class="menu-item" href="ventas.html"><span class="icon">💰</span><span class="text">Ventas</span></a>
            <a class="menu-item" href="compras.html"><span class="icon">🧾</span><span class="text">Compras</span></a>
            <a class="menu-item active" href="proveedores.html"><span class="icon">👥</span><span class="text">Proveedores</span></a>
            <a class="menu-item" href="reportes.html"><span class="icon">📊</span><span class="text">Reportes</span></a>
            <a class="menu-item" href="configuracion.html"><span class="icon">⚙</span><span class="text">Configuración</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>Proveedores</h1>
            <button class="btn-add" id="openModal">+ Agregar proveedor</button>
        </header>

        <table class="product-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Fecha registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="proveedoresList"></tbody>
        </table>
    </main>
</div>

<!-- MODAL -->
<div class="modal" id="proveedorModal">
    <div class="modal-content">
        <h2 id="modalTitulo">Nuevo proveedor</h2>
        <input type="text" id="provNombre" placeholder="Nombre *">
        <input type="text" id="provTelefono" placeholder="Teléfono">
        <input type="email" id="provEmail" placeholder="Email">
        <button id="saveProveedor">Guardar</button>
        <button id="cerrarModal" style="background:#aaa; margin-top:8px">Cancelar</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/proveedores.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
