<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas | MyControl</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ventas.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-texto">Cargando...</p>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="logo" alt="MyControl">
            <h2>MyControl</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" href="dashboard.html"><span>🏠</span><span>Inicio</span></a>
            <a class="menu-item" href="inventario.html"><span>📦</span><span>Inventario</span></a>
            <a class="menu-item active" href="ventas.html"><span>💰</span><span>Ventas</span></a>
            <a class="menu-item" href="compras.html"><span>🧾</span><span>Compras</span></a>
            <a class="menu-item" href="proveedores.html"><span>👥</span><span>Proveedores</span></a>
            <a class="menu-item" href="reportes.html"><span>📊</span><span>Reportes</span></a>
            <a class="menu-item" href="configuracion.html"><span>⚙</span><span>Configuración</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="ventas-header">
                <h1>Nueva <span>Venta</span></h1>
                <a href="ventas-historial.html" class="btn-historial">
                    <span>🕒</span> Historial
                </a>
            </div>
        </header>

        <div class="ventas-nueva-layout">

            <!-- COLUMNA IZQUIERDA: productos -->
            <div class="ventas-col-productos">

                <!-- Buscador -->
            <div class="venta-buscador-wrap" style="display:flex;gap:8px;align-items:center">
                <div style="position:relative;flex:1">
                    <span class="buscador-icono">🔍</span>
                    <input type="text" id="buscarProducto"
                        placeholder="Buscar producto por nombre o código...">
                </div>
                <button id="btnEscanerVentas" style="
                    padding:12px 14px;
                    background:#FF8500;
                    color:white;
                    border:none;
                    border-radius:12px;
                    font-size:20px;
                    cursor:pointer;
                    flex-shrink:0;
                    height:50px;
                " title="Escanear código">📷</button>
            </div>

                <!-- Contador resultados -->
                <p class="venta-contador" id="contadorProductos"></p>

                <!-- Grid de cards -->
                <div class="venta-cards-grid" id="productosGrid"></div>
                <div class="paginacion-ventas" id="paginacionVentas"></div>

            </div>

            <!-- COLUMNA DERECHA: carrito -->
            <div class="ventas-col-carrito">

                <div class="carrito-box">
                    <div class="carrito-header">
                        <h2>🛒 Carrito</h2>
                        <span class="carrito-badge" id="carritoBadge">0</span>
                    </div>

                    <div id="carritoVacio" class="carrito-vacio">
                        <p>Agrega productos<br>desde el catálogo</p>
                    </div>

                    <div id="carritoItems"></div>

                    <div class="carrito-total-box" id="carritoTotalBox" style="display:none">
                        <div class="carrito-total-fila">
                            <span>Total</span>
                            <span class="carrito-total-monto">$<span id="total">0.00</span></span>
                        </div>

                        <select id="metodoPago">
                            <option value="efectivo">💵 Efectivo</option>
                            <option value="tarjeta">💳 Tarjeta</option>
                            <option value="transferencia">📲 Transferencia</option>
                        </select>

                        <button id="registrarVenta">✅ Registrar Venta</button>
                        <button id="cancelarVenta">🚫 Cancelar venta</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- MODAL ESCÁNER -->
<div class="modal" id="modalEscaner">
    <div class="modal-content" style="max-width:380px">
        <h2>📷 Escanear código</h2>
        <p style="font-size:13px;color:#888;margin-top:-8px">Apunta la cámara al código de barras</p>
        <div id="escaner-viewport" style="
            width:100%;
            height:220px;
            background:#000;
            border-radius:10px;
            overflow:hidden;
            margin:12px 0;
            position:relative;
        ">
            <div style="
                position:absolute;
                top:50%;
                left:10%;
                width:80%;
                height:2px;
                background:#FF8500;
                transform:translateY(-50%);
                z-index:10;
                box-shadow:0 0 8px #FF8500;
            "></div>
        </div>
        <p style="font-size:12px;color:#aaa;text-align:center" id="escanerStatus">Iniciando cámara...</p>
        <button id="cerrarEscaner" style="
            width:100%;
            margin-top:10px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#eee;
            color:#555;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
        ">Cancelar</button>
    </div>
</div>


<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ventas.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
