<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas | MyControl</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ventas.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-texto">Cargando...</p>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="logo" alt="MyControl">
            <h2>MyControl</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" href="dashboard.html"><span>🏠</span><span>Inicio</span></a>
            <a class="menu-item" href="inventario.html"><span>📦</span><span>Inventario</span></a>
            <a class="menu-item active" href="ventas.html"><span>💰</span><span>Ventas</span></a>
            <a class="menu-item" href="compras.html"><span>🧾</span><span>Compras</span></a>
            <a class="menu-item" href="proveedores.html"><span>👥</span><span>Proveedores</span></a>
            <a class="menu-item" href="reportes.html"><span>📊</span><span>Reportes</span></a>
            <a class="menu-item" href="configuracion.html"><span>⚙</span><span>Configuración</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="ventas-header">
                <h1>Nueva <span>Venta</span></h1>
                <a href="ventas-historial.html" class="btn-historial">
                    <span>🕒</span> Historial
                </a>
            </div>
        </header>

        <div class="ventas-nueva-layout">

            <!-- COLUMNA IZQUIERDA: productos -->
            <div class="ventas-col-productos">

                <!-- Buscador -->
                <div class="venta-buscador-wrap">
                    <span class="buscador-icono">🔍</span>
                    <input type="text" id="buscarProducto"
                        placeholder="Buscar producto por nombre o código...">
                </div>

                <!-- Contador resultados -->
                <p class="venta-contador" id="contadorProductos"></p>

                <!-- Grid de cards -->
                <div class="venta-cards-grid" id="productosGrid"></div>

            </div>

            <!-- COLUMNA DERECHA: carrito -->
            <div class="ventas-col-carrito">

                <div class="carrito-box">
                    <div class="carrito-header">
                        <h2>🛒 Carrito</h2>
                        <span class="carrito-badge" id="carritoBadge">0</span>
                    </div>

                    <div id="carritoVacio" class="carrito-vacio">
                        <p>Agrega productos<br>desde el catálogo</p>
                    </div>

                    <div id="carritoItems"></div>

                    <div class="carrito-total-box" id="carritoTotalBox" style="display:none">
                        <div class="carrito-total-fila">
                            <span>Total</span>
                            <span class="carrito-total-monto">$<span id="total">0.00</span></span>
                        </div>

                        <select id="metodoPago">
                            <option value="efectivo">💵 Efectivo</option>
                            <option value="tarjeta">💳 Tarjeta</option>
                            <option value="transferencia">📲 Transferencia</option>
                        </select>

                        <button id="registrarVenta">✅ Registrar Venta</button>
                        <button id="cancelarVenta">🚫 Cancelar venta</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ventas.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
