<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | MyControl</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/inventario.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-texto">Cargando...</p>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="logo" alt="logo">
            <h2>MyControl</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="text">Inicio</span></a>
            <a class="menu-item active" href="inventario.html"><span class="icon">📦</span><span class="text">Inventario</span></a>
            <a class="menu-item" href="ventas.html"><span class="icon">💰</span><span class="text">Ventas</span></a>
            <a class="menu-item" href="compras.html"><span class="icon">🧾</span><span class="text">Compras</span></a>
            <a class="menu-item" href="proveedores.html"><span class="icon">👥</span><span class="text">Proveedores</span></a>
            <a class="menu-item" href="reportes.html"><span class="icon">📊</span><span class="text">Reportes</span></a>
            <a class="menu-item" href="configuracion.html"><span class="icon">⚙</span><span class="text">Configuración</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>Inventario</h1>
            <button class="btn-add" id="openModal">+ Agregar producto</button>
        </header>

        <!-- BUSCADOR -->
        <div class="inventario-toolbar">
            <input type="text" id="buscadorInventario" placeholder="🔍 Buscar producto...">
        </div>

        <!-- GRID DE CARTAS -->
        <div class="productos-grid" id="productosGrid"></div>

    </main>
</div>

<!-- MODAL AGREGAR/EDITAR -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <h2 id="modalTitulo">Nuevo producto</h2>

        <!-- IMAGEN -->
        <div class="imagen-upload" id="imagenUpload">
            <img id="previewImg" src="assets/img/no-image.png" alt="preview">
            <div class="imagen-overlay">
                <label for="inputImagen">
                    📷 Cambiar imagen
                    <input type="file" id="inputImagen" accept="image/*" capture="environment" style="display:none">
                </label>
            </div>
        </div>

        <input type="text"   id="nombre"  placeholder="Nombre del producto">
        <input type="text"   id="codigo"  placeholder="Código de barras">
        <input type="number" id="precio"  placeholder="Precio de venta">
        <input type="number" id="stock"   placeholder="Stock inicial">

        <div class="modal-btns">
            <button id="saveProduct">Guardar</button>
            <button id="cerrarModal" style="background:#aaa">Cancelar</button>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/inventario.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
