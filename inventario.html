<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | MyControl</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/inventario.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-texto">Cargando...</p>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.png" class="logo" alt="logo">
            <h2>MyControl</h2>
        </div>
        <nav class="menu">
            <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="text">Inicio</span></a>
            <a class="menu-item active" href="inventario.html"><span class="icon">📦</span><span class="text">Inventario</span></a>
            <a class="menu-item" href="ventas.html"><span class="icon">💰</span><span class="text">Ventas</span></a>
            <a class="menu-item" href="compras.html"><span class="icon">🧾</span><span class="text">Compras</span></a>
            <a class="menu-item" href="proveedores.html"><span class="icon">👥</span><span class="text">Proveedores</span></a>
            <a class="menu-item" href="reportes.html"><span class="icon">📊</span><span class="text">Reportes</span></a>
            <a class="menu-item" href="configuracion.html"><span class="icon">⚙</span><span class="text">Configuración</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>Inventario</h1>
            <button class="btn-add" id="openModal">+ Agregar producto</button>
        </header>

        <!-- BUSCADOR -->
        <div class="inventario-toolbar">
            <input type="text" id="buscadorInventario" placeholder="🔍 Buscar producto...">
        </div>

        <!-- GRID DE CARTAS -->
        <div class="productos-grid" id="productosGrid"></div>
        <div class="paginacion" id="paginacionInventario"></div>

    </main>
</div>

<!-- MODAL AGREGAR/EDITAR -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <h2 id="modalTitulo">Nuevo producto</h2>

        <!-- IMAGEN -->
        <div class="imagen-upload" id="imagenUpload">
            <img id="previewImg" src="assets/img/no-image.png" alt="preview">
            <div class="imagen-overlay">
                <label for="inputImagen">
                    📷 Cambiar imagen
                    <input type="file" id="inputImagen" accept="image/*" capture="environment" style="display:none">
                </label>
            </div>
        </div>

        <input type="text"   id="nombre"  placeholder="Nombre del producto">
        <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="codigo" placeholder="Código de barras" style="flex:1">
                <button type="button" id="btnEscanerInventario" style="
                    padding:10px 14px;
                    background:#FF8500;
                    color:white;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                    cursor:pointer;
                    flex-shrink:0;
                " title="Escanear código">📷</button>
            </div>
        <input type="number" id="precio" placeholder="Precio de venta" min="0" step="0.01">
        <input type="number" id="stock"  placeholder="Cantidad"   min="0">

        <div class="modal-btns">
            <button id="saveProduct">Guardar</button>
            <button id="cerrarModal" style="background:#aaa">Cancelar</button>
        </div>
    </div>
</div>


<!-- MODAL ESCÁNER -->
<div class="modal" id="modalEscaner">
    <div class="modal-content" style="max-width:380px">
        <h2>📷 Escanear código</h2>
        <p style="font-size:13px;color:#888;margin-top:-8px">Apunta la cámara al código de barras</p>
        <div id="escaner-viewport" style="
            width:100%;
            height:220px;
            background:#000;
            border-radius:10px;
            overflow:hidden;
            margin:12px 0;
            position:relative;
        ">
            <div style="
                position:absolute;
                top:50%;
                left:10%;
                width:80%;
                height:2px;
                background:#FF8500;
                transform:translateY(-50%);
                z-index:10;
                box-shadow:0 0 8px #FF8500;
            "></div>
        </div>
        <p style="font-size:12px;color:#aaa;text-align:center" id="escanerStatus">Iniciando cámara...</p>
        <button id="cerrarEscaner" style="
            width:100%;
            margin-top:10px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#eee;
            color:#555;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
        ">Cancelar</button>
    </div>
</div>


<script src="js/config.js"></script>
<script src="js/session.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/inventario.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
